<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>I/US 5 Track Recorder </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #000000;
      --surface:   #141c28;
      --panel:     #101620;
      --panel2:    #141c28;
      --border:    #1c2a3a;
      --border2:   #243347;
      --text:      #c8dff5;
      --muted:     #4a6480;
      --accent:    #1e6fff;
      --accent-lo: #0d3a8f;
      --wave:      #1a4fd6;
      --wave-hi:   #3a7bff;
      --wave-rec:  #e03030;
      --playhead:  #f59e0b;
      --danger:    #dc2626;
      --ok:        #16a34a;
      --warn:      #d97706;
      --label-h:   9px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    .header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 10px 10px;
      background: #000000;
      border-bottom: 1px solid #050505;
    }
    .header-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 6px 8px;
      border: none;
      border-radius: 0;
      background: #000000;
      box-shadow: none;
    }
    .header-panel.compact { padding: 4px 8px; }
    .header-panel.actions { justify-content: flex-start; flex-wrap: wrap; padding-top: 2px; }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.1em;
      color: var(--wave-hi);
      white-space: nowrap;
      line-height: 1;
      min-width: 94px;
    }
    .logo span { color: var(--muted); font-weight: 500; font-size: 9px; display: block; letter-spacing: 0.08em; margin-top: 4px; text-transform: uppercase; }
    .header-sep { width: 1px; align-self: stretch; background: #080808; flex-shrink: 0; opacity: 0.5; }
    .header-group { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .field-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }
    .field-label {
      font-size: 8px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .hbtn {
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid #111111;
      border-radius: 8px;
      background: #000000;
      box-shadow: none;
    }
    .hbtn:hover { border-color: #1a1a1a; color: #ffffff; transform: none; }
    .hbtn.accent { background: #000000; border-color: #111111; color: var(--text); }
    .hbtn.accent:hover { background: #000000; color: #ffffff; }
    .hbtn.red { background: #000000; border-color: #111111; color: #a8a8a8; }
    .hbtn.red:hover { background: #050505; color: #d8d8d8; }
    .hbtn.green { background: #000000; border-color: #111111; color: var(--text); }
    .hbtn.green:hover { background: #050505; color: #ffffff; }
    .hbtn.orange { background: #000000; border-color: #111111; color: #9a9a9a; }
    .hbtn.orange:hover { background: #050505; color: #d0d0d0; }

    select {
      color: var(--text);
      cursor: pointer;
      outline: none;
      min-width: 0;
      width: 100%;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid #111111;
      border-radius: 8px;
      background: #000000;
      box-shadow: none;
    }
    select:focus { border-color: #1a1a1a; }
    .info-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      min-width: 84px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid #111111;
      background: #000000;
      color: var(--wave-hi);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .info-chip.muted {
      color: var(--muted);
    }

    .master-vol-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .master-vol-wrap .lbl { font-size: 9px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .master-vol-wrap input[type="range"] { width: 80px; }
    #masterGainValue { font-size: 10px; color: var(--wave-hi); min-width: 28px; }

    .master-meter-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .master-meter-wrap .lbl { font-size: 9px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .master-meter-outer {
      width: 80px; height: 6px;
      border-radius: 999px;
      background: #050505;
      border: 1px solid #111111;
      overflow: hidden;
    }
    .master-meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #16a34a, #f59e0b, #dc2626);
      transition: width 0.05s;
    }

    .status-bar {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    @media (max-width: 1100px) {
      .header {
        grid-template-columns: 1fr;
      }
      .header-panel.actions { justify-content: flex-start; }
    }

    /* ─── MAIN LAYOUT ─────────────────────────────────────── */
    .main {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── TRACK ───────────────────────────────────────────── */
    .track {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .track.recording { border-color: #6b1a1a; }
    .track.playing   { border-color: var(--accent-lo); }

    .track.selected { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(30,111,255,0.2) inset; }
    .track-id-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .select-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: "JetBrains Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 8px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: var(--panel2);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .select-toggle:hover { border-color: var(--accent); color: var(--text); }
    .select-toggle input { accent-color: var(--accent); width: 12px; height: 12px; }
    .select-toggle.on { border-color: var(--accent); color: var(--wave-hi); background: rgba(30,111,255,0.14); }

    .track-row {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr) 136px;
      align-items: stretch;
      gap: 0;
    }

    /* LEFT — track identity */
    .track-id {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid var(--border);
      gap: 8px;
      background: linear-gradient(180deg, rgba(9,15,24,0.96), rgba(12,18,28,0.86));
    }
    .track-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .track-left-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .track-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      line-height: 1;
      color: var(--wave-hi);
      opacity: 0.25;
    }
    .track-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text);
      text-transform: uppercase;
    }
    .track-status {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .track-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .badge {
      font-size: 8px;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      color: var(--muted);
      text-transform: uppercase;
    }
    .badge.rec-active { border-color: #7f1d1d; color: #fca5a5; background: #3a1010; animation: pulse-red 1s ease-in-out infinite; }
    .badge.loop-on { border-color: #1a5c33; color: #86efac; background: #0c2018; }
    @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* MIDDLE — waveform */
    .track-wave-col {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .wave-wrap {
      flex: 1;
      background: #080e16;
      position: relative;
      overflow: hidden;
    }
    canvas.wave {
      width: 100%;
      height: 80px;
      display: block;
    }

    /* FX ROW */
    .track-fx {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .fx-box {
      padding: 6px 10px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }
    .fx-box:nth-child(3n) { border-right: none; }
    .fx-box:nth-last-child(-n+3) { border-bottom: none; }
    .fx-box:last-child { border-right: none; }
    .fx-label {
      font-size: var(--label-h);
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 3px;
      white-space: nowrap;
    }
    .fx-val {
      font-size: 9px;
      color: var(--wave-hi);
      margin-top: 2px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border2);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--wave-hi);
      border: 2px solid var(--bg);
      cursor: pointer;
      transition: background 0.15s;
    }
    input[type="range"]:hover::-webkit-slider-thumb { background: #fff; }
    input[type="range"]::-moz-range-thumb {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--wave-hi);
      border: 2px solid var(--bg);
      cursor: pointer;
    }

    /* track meter inline */
    .track-meter-outer {
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }
    .track-meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #16a34a, #f59e0b, #dc2626);
    }

    /* RIGHT — buttons */
    .track-btns {
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-content: center;
      border-left: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(10,16,25,0.98), rgba(8,13,21,0.92));
    }
    .tbtn-row { display: contents; }
    .tbtn {
      width: 100%;
      min-height: 34px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--panel2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .track-btns .tbtn.play { min-height: 38px; }
    .track-btns .tbtn.clr  { background: #000000; border-color: #2a2a2a; color: #9a9a9a; }
    .track-play-btn {
      min-width: 96px;
      justify-content: center;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding-inline: 12px;
    }
    .tbtn:hover { transform: translateY(-1px); }
    .tbtn.rec  { background: #2d0f0f; border-color: #7f1d1d; color: #fca5a5; }
    .tbtn.rec:hover  { background: #3f1212; }
    .tbtn.stop { background: var(--panel2); border-color: var(--border2); }
    .tbtn.play { background: var(--accent-lo); border-color: var(--accent); color: var(--wave-hi); }
    .tbtn.play:hover { background: #1558d0; }
    .tbtn.clr  { background: #2c1a06; border-color: #784e0a; color: #fcd34d; }
    .tbtn.clr:hover  { background: #0a0a0a; color: #d0d0d0; }
    .tbtn.exp  { background: #0c2018; border-color: #1a5c33; color: #86efac; }
    .tbtn.exp:hover  { background: #112b1e; }
    .tbtn.loop { background: var(--panel2); border-color: var(--border2); color: var(--muted); }
    .tbtn.loop.on { background: #0c2018; border-color: #1a5c33; color: #86efac; }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 700px) {
      .track-row {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .track-id {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .track-btns {
        grid-column: 1 / -1;
        border-left: none;
        border-top: 1px solid var(--border);
      }
      .track-fx { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .fx-box:nth-child(3n) { border-right: 1px solid var(--border); }
      .fx-box:nth-child(2n) { border-right: none; }
      .fx-box:nth-last-child(-n+3) { border-bottom: 1px solid var(--border); }
      .fx-box:nth-last-child(-n+2) { border-bottom: none; }
      .track-num { font-size: 16px; }
    }
    @media (max-width: 700px) {
      .header-panel {
        flex-wrap: wrap;
      }
      .header-sep { display: none; }
      .field-stack {
        flex-basis: 100%;
      }
      .status-bar {
        white-space: normal;
      }
    }
    @media (max-width: 480px) {
      .master-vol-wrap input[type="range"] { width: 60px; }
      .master-meter-outer { width: 50px; }
      canvas.wave { height: 60px; }
      .track-fx { grid-template-columns: 1fr; }
      .fx-box { border-right: none !important; border-bottom: 1px solid var(--border); }
      .fx-box:last-child { border-bottom: none; }
      .track-btns { grid-template-columns: 1fr 1fr; }
      .track-play-btn { min-width: 0; width: 100%; }
      .hbtn, select, .info-chip { min-height: 32px; }
    }

    /* ─── SCROLLBAR ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 999px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ═══════════════════════════ -->
<header class="header">
  <div class="header-panel">
    <div class="logo">I/US<span>Five Track Recorder</span></div>
    <div class="header-sep"></div>
    <div class="field-stack">
      <span class="field-label">Input Device</span>
      <select id="inputDevice" title="Audio Input Device">
        <option value="">Enable audio to load inputs</option>
      </select>
    </div>
    <div class="field-stack" style="max-width:120px; flex:0 0 120px;">
      <span class="field-label">Sample Rate</span>
      <div id="sampleRateInfo" class="info-chip muted" title="Sample Rate">— Hz</div>
    </div>
  </div>

  <div class="header-panel compact">
    <button id="initAudioBtn" class="hbtn accent">Enable Audio</button>
    <select id="monitorEnabled" title="Input Monitoring" style="max-width:132px; flex:0 0 132px;">
      <option value="off">Monitor Off</option>
      <option value="on">Monitor On</option>
    </select>
    <div class="header-sep"></div>
    <div class="master-vol-wrap">
      <span class="lbl">Vol</span>
      <input id="masterGain" type="range" min="0" max="1.5" step="0.01" value="1" />
      <span id="masterGainValue">1.00</span>
    </div>
    <div class="master-meter-wrap">
      <span class="lbl">Master</span>
      <div class="master-meter-outer"><div id="masterMeter" class="master-meter-fill"></div></div>
    </div>
    <div class="header-sep"></div>
    <div class="status-bar" id="globalStatus">Click “Enable Audio” to begin.</div>
  </div>

  <div class="header-panel actions">
    <button id="playAllBtn"  class="hbtn accent">▶ Play All</button>
    <button id="stopAllBtn"  class="hbtn">■ Stop</button>
    <button id="clearAllBtn" class="hbtn red">✕ Clear All</button>
    <button id="exportMixBtn" class="hbtn green">⬇ Export</button>
  </div>
</header>

<!-- ═══════════════════════════════ TRACKS ══════════════════════════ -->
<main class="main" id="tracks"></main>

<script>
  const TRACK_COUNT = 5;
  const tracksContainer = document.getElementById('tracks');
  const inputDeviceEl   = document.getElementById('inputDevice');
  const initAudioBtn    = document.getElementById('initAudioBtn');
  const exportMixBtn    = document.getElementById('exportMixBtn');
  const playAllBtn      = document.getElementById('playAllBtn');
  const stopAllBtn      = document.getElementById('stopAllBtn');
  const clearAllBtn     = document.getElementById('clearAllBtn');
  const globalStatus    = document.getElementById('globalStatus');
  const sampleRateInfo  = document.getElementById('sampleRateInfo');
  const masterGainEl    = document.getElementById('masterGain');
  const masterGainValue = document.getElementById('masterGainValue');
  const masterMeterEl   = document.getElementById('masterMeter');
  const monitorEnabledEl= document.getElementById('monitorEnabled');

  let audioCtx = null, inputStream = null, inputSource = null;
  let recordProcessor = null, meterAnalyser = null;
  let monitorGain = null, masterGainNode = null, mixBus = null;
  let currentInputDeviceId = '';
  let meterRAF = null;

  const tracks = [];

  /* ── Utilities ─────────────────────────────────────────── */
  function setStatus(msg) { globalStatus.textContent = msg; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function createImpulseResponse(ctx, seconds = 2.2, decay = 2.2) {
    const rate = ctx.sampleRate;
    const len = Math.floor(rate * seconds);
    const buf = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
    return buf;
  }

  function interleaveStereo(L, R) {
    const out = new Float32Array(L.length * 2);
    for (let i = 0, o = 0; i < L.length; i++) { out[o++] = L[i]; out[o++] = R[i]; }
    return out;
  }

  function encodeWAVFromFloat32(data, sampleRate) {
    const bps = 2, ba = 2 * bps;
    const buf = new ArrayBuffer(44 + data.length * bps);
    const v = new DataView(buf);
    const ws = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
    ws(0,'RIFF'); v.setUint32(4, 36 + data.length * bps, true); ws(8,'WAVE');
    ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,2,true);
    v.setUint32(24,sampleRate,true); v.setUint32(28,sampleRate*ba,true);
    v.setUint16(32,ba,true); v.setUint16(34,16,true);
    ws(36,'data'); v.setUint32(40, data.length * bps, true);
    let off = 44;
    for (let i = 0; i < data.length; i++, off += 2) {
      const s = clamp(data[i], -1, 1);
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    }
    return new Blob([v], { type: 'audio/wav' });
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), { href: url, download: filename });
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  function mergeFloat32Chunks(chunks, total) {
    const out = new Float32Array(total);
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    return out;
  }

  function audioBufferToMonoPeaks(ab, count = 1200) {
    const len = ab.length;
    const block = Math.max(1, Math.floor(len / count));
    const peaks = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      const s = i * block, e = Math.min(len, s + block);
      let p = 0;
      for (let ch = 0; ch < ab.numberOfChannels; ch++) {
        const d = ab.getChannelData(ch);
        for (let j = s; j < e; j++) p = Math.max(p, Math.abs(d[j]));
      }
      peaks[i] = p;
    }
    return peaks;
  }

  /* ── Waveform Drawing ──────────────────────────────────── */
  function drawWaveform(track, liveSamples = null) {
    const canvas = track.canvas;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.clientWidth, H = canvas.clientHeight;
    if (!W || !H) return;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Background
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#060c14');
    bg.addColorStop(1, '#08101b');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = '#0e1e30';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(0, (H / 4) * i);
      ctx.lineTo(W, (H / 4) * i);
      ctx.stroke();
    }

    // Centre line
    ctx.strokeStyle = '#1a3050';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();

    let peaks = null;
    if (liveSamples && liveSamples.length) {
      const count = Math.min(W, liveSamples.length);
      peaks = new Float32Array(count);
      const block = Math.max(1, Math.floor(liveSamples.length / count));
      for (let i = 0; i < count; i++) {
        let p = 0;
        const s = i * block, e = Math.min(liveSamples.length, s + block);
        for (let j = s; j < e; j++) p = Math.max(p, Math.abs(liveSamples[j]));
        peaks[i] = p;
      }
    } else if (track.audioBuffer) {
      peaks = audioBufferToMonoPeaks(track.audioBuffer, Math.min(W, 1200));
    }

    if (!peaks) {
      ctx.fillStyle = '#1a3a5c';
      ctx.font = '10px JetBrains Mono, monospace';
      ctx.fillText('NO AUDIO', 12, 18);
      return;
    }

    const isRec = track.isRecording;
    const midY = H / 2;
    const amp = H * 0.44;

    // Glow / fill
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    if (isRec) {
      grad.addColorStop(0, 'rgba(220,40,40,0.18)');
      grad.addColorStop(0.5, 'rgba(220,40,40,0.06)');
      grad.addColorStop(1, 'rgba(220,40,40,0.18)');
    } else {
      grad.addColorStop(0, 'rgba(26,79,214,0.22)');
      grad.addColorStop(0.5, 'rgba(26,79,214,0.06)');
      grad.addColorStop(1, 'rgba(26,79,214,0.22)');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, midY);
    for (let i = 0; i < peaks.length; i++) {
      ctx.lineTo((i / Math.max(1, peaks.length - 1)) * W, midY - peaks[i] * amp);
    }
    for (let i = peaks.length - 1; i >= 0; i--) {
      ctx.lineTo((i / Math.max(1, peaks.length - 1)) * W, midY + peaks[i] * amp);
    }
    ctx.closePath();
    ctx.fill();

    // Waveform lines (top + bottom mirror)
    const color = isRec ? '#e03030' : '#1a4fd6';
    const hiColor = isRec ? '#ff6060' : '#3a7bff';
    const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
    lineGrad.addColorStop(0, color);
    lineGrad.addColorStop(0.5, hiColor);
    lineGrad.addColorStop(1, color);
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < peaks.length; i++) {
      const x = (i / Math.max(1, peaks.length - 1)) * W;
      const y = peaks[i] * amp;
      ctx.moveTo(x, midY - y);
      ctx.lineTo(x, midY + y);
    }
    ctx.stroke();

    // Playhead
    if (track.playPosition > 0 && track.audioBuffer && track.audioBuffer.duration > 0) {
      const px = (track.playPosition / track.audioBuffer.duration) * W;
      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  /* ── Track Creation ────────────────────────────────────── */
  function createTrack(index) {
    const trackEl = document.createElement('div');
    trackEl.className = 'track';
    trackEl.id = `track-el-${index}`;

    const trackNames = ['',' ',' ',' ',' '];

    trackEl.innerHTML = `

          <div class="track-id-top">
            <div class="track-meta">
              <div class="track-num">T${index + 1}</div>
              <div class="track-name">${trackNames[index] || `TRACK ${index+1}`}</div>
              <div class="track-status" id="track-status-${index}">EMPTY</div>
              <div class="track-badges">
                <span class="badge" id="track-ready-${index}">READY</span>

        </div>

        <div class="track-wave-col">

            <canvas id="wave-${index}" class="wave"></canvas>
          </div>
          <div class="track-fx">
            <div class="fx-box">
              <div class="fx-label">Volume</div>
              <input id="gain-${index}" type="range" min="0" max="1.5" step="0.01" value="1" />
              <div class="fx-val" id="gain-value-${index}">1.00</div>
            </div>
            <div class="fx-box">
              <div class="fx-label">Pan</div>
              <input id="pan-${index}" type="range" min="-1" max="1" step="0.01" value="0" />
              <div class="fx-val" id="pan-value-${index}">0.00</div>
            </div>
            <div class="fx-box">
              <div class="fx-label">Dly Mix</div>
              <input id="delay-mix-${index}" type="range" min="0" max="1" step="0.01" value="0.2" />

              <div class="fx-val" id="delay-time-value-${index}">0.25s</div>
            </div>
            <div class="fx-box">
              <div class="fx-label">Feedback</div>
              <input id="feedback-${index}" type="range" min="0" max="0.85" step="0.01" value="0.3" />
              <div class="fx-val" id="feedback-value-${index}">0.30</div>
            </div>
            <div class="fx-box">
              <div class="fx-label">Rvb Mix</div>
              <input id="reverb-mix-${index}" type="range" min="0" max="1" step="0.01" value="0.25" />
              <div class="fx-val" id="reverb-mix-value-${index}">0.25</div>
            </div>
          </div>
        </div>

        <div class="track-btns">
          <div class="tbtn-row">
            <button id="record-btn-${index}" class="tbtn rec">REC</button>
            <button id="stop-btn-${index}"   class="tbtn stop">STOP</button>
          </div>
          <div class="tbtn-row">
            <button id="loop-btn-${index}"   class="tbtn loop">LOOP</button>
            <button id="clear-btn-${index}"  class="tbtn clr">CLR</button>
          </div>
        </div>
      </div>
    `;

    tracksContainer.appendChild(trackEl);

    const track = {
      index, el: trackEl,
      canvas:      trackEl.querySelector(`#wave-${index}`),
      statusEl:    trackEl.querySelector(`#track-status-${index}`),
      loopBadge:   trackEl.querySelector(`#track-loop-${index}`),
      readyBadge:  trackEl.querySelector(`#track-ready-${index}`),
      meterEl:     trackEl.querySelector(`#track-meter-${index}`),
      recordBtn:   trackEl.querySelector(`#record-btn-${index}`),
      stopBtn:     trackEl.querySelector(`#stop-btn-${index}`),
      playBtn:     trackEl.querySelector(`#play-btn-${index}`),
      clearBtn:    trackEl.querySelector(`#clear-btn-${index}`),
      loopBtn:     trackEl.querySelector(`#loop-btn-${index}`),
      selectEl:    trackEl.querySelector(`#select-track-${index}`),
      selectToggleEl: trackEl.querySelector(`#select-toggle-${index}`),
      controls: {},
      chunks: [], totalSamples: 0,
      isRecording: false, isPlaying: false,
      selected: false,
      loop: false, playPosition: 0, playbackStartedAt: 0,
      audioBuffer: null, sourceNode: null,
    };

    track.controls.gain        = trackEl.querySelector(`#gain-${index}`);
    track.controls.gainValue   = trackEl.querySelector(`#gain-value-${index}`);
    track.controls.pan         = trackEl.querySelector(`#pan-${index}`);
    track.controls.panValue    = trackEl.querySelector(`#pan-value-${index}`);
    track.controls.delayMix    = trackEl.querySelector(`#delay-mix-${index}`);
    track.controls.delayMixValue  = trackEl.querySelector(`#delay-mix-value-${index}`);
    track.controls.delayTime   = trackEl.querySelector(`#delay-time-${index}`);
    track.controls.delayTimeValue = trackEl.querySelector(`#delay-time-value-${index}`);
    track.controls.feedback    = trackEl.querySelector(`#feedback-${index}`);
    track.controls.feedbackValue  = trackEl.querySelector(`#feedback-value-${index}`);
    track.controls.reverbMix   = trackEl.querySelector(`#reverb-mix-${index}`);
    track.controls.reverbMixValue = trackEl.querySelector(`#reverb-mix-value-${index}`);

    updateTrackSelectionUI(track);
    drawWaveform(track);
    return track;
  }

  function updateTrackStatus(track, text) {
    const len = track.audioBuffer ? ` ${track.audioBuffer.duration.toFixed(2)}s` : '';
    track.statusEl.textContent = `${text.toUpperCase()}${len}`;
    const el = track.el;
    el.classList.toggle('recording', track.isRecording);
    el.classList.toggle('playing', track.isPlaying);
  }


  function updateTrackSelectionUI(track) {
    track.el.classList.toggle('selected', !!track.selected);
    if (track.selectEl) track.selectEl.checked = !!track.selected;
    if (track.selectToggleEl) track.selectToggleEl.classList.toggle('on', !!track.selected);
  }

  /* ── Audio Graph ───────────────────────────────────────── */
  function cleanupTrackAudioGraph(track) {
    const nodes = [
      'inputGain','dryGain','trackGain','panner','delayNode','feedbackGain',
      'delayWetGain','reverbNode','reverbWetGain','analyser'
    ];
    for (const key of nodes) {
      if (track[key] && typeof track[key].disconnect === 'function') {
        try { track[key].disconnect(); } catch (_) {}
      }
      track[key] = null;
    }
    if (track.sourceNode) {
      try { track.sourceNode.stop(); } catch (_) {}
      try { track.sourceNode.disconnect(); } catch (_) {}
      track.sourceNode = null;
    }
    track.isPlaying = false;
    track.playPosition = 0;
    if (track.meterEl) track.meterEl.style.width = '0%';
  }

  function createTrackAudioGraph(track) {
    track.inputGain    = audioCtx.createGain();
    track.dryGain      = audioCtx.createGain();
    track.trackGain    = audioCtx.createGain();
    track.panner       = audioCtx.createStereoPanner();
    track.delayNode    = audioCtx.createDelay(1.0);
    track.feedbackGain = audioCtx.createGain();
    track.delayWetGain = audioCtx.createGain();
    track.reverbNode   = audioCtx.createConvolver();
    track.reverbNode.buffer = createImpulseResponse(audioCtx, 2.4, 2.3);
    track.reverbWetGain= audioCtx.createGain();
    track.analyser     = audioCtx.createAnalyser();
    track.analyser.fftSize = 256;

    track.inputGain.connect(track.dryGain);
    track.dryGain.connect(track.trackGain);
    track.inputGain.connect(track.delayNode);
    track.delayNode.connect(track.feedbackGain);
    track.feedbackGain.connect(track.delayNode);
    track.delayNode.connect(track.delayWetGain);
    track.delayWetGain.connect(track.trackGain);
    track.inputGain.connect(track.reverbNode);
    track.reverbNode.connect(track.reverbWetGain);
    track.reverbWetGain.connect(track.trackGain);
    track.trackGain.connect(track.panner);
    track.panner.connect(track.analyser);
    track.analyser.connect(mixBus);

    track.dryGain.gain.value     = 1;
    track.trackGain.gain.value   = 1;
    track.panner.pan.value       = 0;
    track.delayNode.delayTime.value  = 0.25;
    track.feedbackGain.gain.value    = 0.3;
    track.delayWetGain.gain.value    = 0.2;
    track.reverbWetGain.gain.value   = 0.25;
  }

  /* ── Wire UI ───────────────────────────────────────────── */
  function wireTrackUI(track) {
    const { controls } = track;
    controls.gain.addEventListener('input', () => {
      if (track.trackGain) track.trackGain.gain.value = +controls.gain.value;
      controls.gainValue.textContent = (+controls.gain.value).toFixed(2);
    });
    controls.pan.addEventListener('input', () => {
      if (track.panner) track.panner.pan.value = +controls.pan.value;
      controls.panValue.textContent = (+controls.pan.value).toFixed(2);
    });
    controls.delayMix.addEventListener('input', () => {
      if (track.delayWetGain) track.delayWetGain.gain.value = +controls.delayMix.value;
      controls.delayMixValue.textContent = (+controls.delayMix.value).toFixed(2);
    });
    controls.delayTime.addEventListener('input', () => {
      if (track.delayNode) track.delayNode.delayTime.value = +controls.delayTime.value;
      controls.delayTimeValue.textContent = `${(+controls.delayTime.value).toFixed(2)}s`;
    });
    controls.feedback.addEventListener('input', () => {
      if (track.feedbackGain) track.feedbackGain.gain.value = +controls.feedback.value;
      controls.feedbackValue.textContent = (+controls.feedback.value).toFixed(2);
    });
    controls.reverbMix.addEventListener('input', () => {
      if (track.reverbWetGain) track.reverbWetGain.gain.value = +controls.reverbMix.value;
      controls.reverbMixValue.textContent = (+controls.reverbMix.value).toFixed(2);
    });

    track.recordBtn.addEventListener('click', () => startTrackRecording(track.index));
    track.stopBtn.addEventListener('click',   () => stopTrack(track.index));
    track.playBtn.addEventListener('click',   () => playTrack(track.index));
    track.clearBtn.addEventListener('click',  () => clearTrack(track.index));
    track.selectEl.addEventListener('change', () => {
      track.selected = track.selectEl.checked;
      updateTrackSelectionUI(track);
      const count = tracks.filter(t => t.selected).length;
      setStatus(count ? `${count} track${count === 1 ? '' : 's'} selected. Export will use the selection.` : 'No tracks selected. Export will use all recorded tracks.');
    });
    track.loopBtn.addEventListener('click',   () => {
      track.loop = !track.loop;
      track.loopBtn.classList.toggle('on', track.loop);
      track.loopBadge.textContent = track.loop ? 'LOOP ON' : 'LOOP';
      track.loopBadge.className = 'badge' + (track.loop ? ' loop-on' : '');
      if (track.sourceNode) track.sourceNode.loop = track.loop;
    });
  }

  /* ── Playback ──────────────────────────────────────────── */
  function finalizeRecording(track) {
    if (!track.totalSamples) { updateTrackStatus(track, 'Empty'); drawWaveform(track); return; }
    const mono = mergeFloat32Chunks(track.chunks, track.totalSamples);
    const buf = audioCtx.createBuffer(1, mono.length, audioCtx.sampleRate);
    buf.copyToChannel(mono, 0, 0);
    track.audioBuffer = buf;
    updateTrackStatus(track, 'Recorded');
    drawWaveform(track);
  }

  function stopSource(track) {
    if (track.sourceNode) {
      try { track.sourceNode.stop(); } catch (_) {}
      try { track.sourceNode.disconnect(); } catch (_) {}
    }
    track.sourceNode = null;
    track.isPlaying = false;
    track.playPosition = 0;
    if (track.meterEl) track.meterEl.style.width = '0%';
    drawWaveform(track);
  }

  function stopTrack(index) {
    const track = tracks[index];
    if (track.isRecording) {
      track.isRecording = false;
      track.readyBadge.textContent = 'READY';
      track.readyBadge.className = 'badge';
      finalizeRecording(track);
      setStatus(`Stopped recording Track ${index + 1}.`);
    }
    if (track.isPlaying) {
      stopSource(track);
      updateTrackStatus(track, 'Stopped');
    }
  }

  function stopAllTracks() { tracks.forEach((_, i) => stopTrack(i)); }

  function clearTrack(index) {
    const track = tracks[index];
    stopTrack(index);
    track.chunks = []; track.totalSamples = 0; track.audioBuffer = null;
    track.loop = false;
    track.loopBtn.classList.remove('on');
    track.loopBadge.textContent = 'LOOP';
    track.loopBadge.className = 'badge';
    updateTrackStatus(track, 'Empty');
    drawWaveform(track);
    setStatus(`Cleared Track ${index + 1}.`);
  }

  function startTrackRecording(index) {
    const track = tracks[index];
    if (!audioCtx || !inputSource) { setStatus('Enable audio first.'); return; }

    tracks.forEach((t, i) => {
      if (t.isRecording && i !== index) stopTrack(i);
    });

    stopTrack(index);
    track.chunks = []; track.totalSamples = 0; track.audioBuffer = null;
    track.isRecording = true;
    track.readyBadge.textContent = 'REC';
    track.readyBadge.className = 'badge rec-active';
    track.meterEl.style.width = '0%';
    updateTrackStatus(track, 'Recording');
    setStatus(`Recording Track ${index + 1} from selected input.`);
  }

  function buildTrackSource(track) {
    if (!track.audioBuffer) return null;
    const src = audioCtx.createBufferSource();
    src.buffer = track.audioBuffer;
    src.loop = track.loop;
    src.connect(track.inputGain);
    src.onended = () => {
      if (!track.loop) {
        track.isPlaying = false; track.playPosition = 0;
        updateTrackStatus(track, 'Stopped'); drawWaveform(track);
      }
    };
    track.sourceNode = src;
    return src;
  }

  async function playTrack(index) {
    const track = tracks[index];
    if (!track.audioBuffer || !audioCtx) return;
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    if (track.isPlaying) stopTrack(index);
    const src = buildTrackSource(track);
    if (!src) return;
    track.playbackStartedAt = audioCtx.currentTime;
    track.isPlaying = true;
    src.start();
    updateTrackStatus(track, 'Playing');
    setStatus(`Playing Track ${index + 1}${track.loop ? ' (loop)' : ''}.`);
  }

  async function playAllTracks() {
    if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
    tracks.forEach((t, i) => { if (t.audioBuffer) playTrack(i); });
  }

  function getExportTargets() {
    const selected = tracks.filter(t => t.selected && t.audioBuffer);
    if (selected.length) return selected;
    return tracks.filter(t => t.audioBuffer);
  }

  function exportTrackBuffer(track, filename = `track-${track.index + 1}.wav`) {
    if (!track.audioBuffer) return false;
    const mono = track.audioBuffer.getChannelData(0);
    const stereo = interleaveStereo(mono, mono);
    downloadBlob(encodeWAVFromFloat32(stereo, track.audioBuffer.sampleRate), filename);
    return true;
  }

  function exportTrack(index) {
    const track = tracks[index];
    if (!track.audioBuffer) { setStatus(`Track ${index + 1} has no audio.`); return; }
    exportTrackBuffer(track, `track-${index + 1}.wav`);
    setStatus(`Exported Track ${index + 1} as WAV.`);
  }

  async function exportFullMix(targetTracks = null) {
    if (!audioCtx) { setStatus('Enable audio first.'); return; }
    const populated = targetTracks && targetTracks.length ? targetTracks : tracks.filter(t => t.audioBuffer);
    if (!populated.length) { setStatus('No tracks recorded.'); return; }

    const maxDur = Math.max(...populated.map(t => t.audioBuffer.duration));
    const offline = new OfflineAudioContext(2, Math.ceil(maxDur * audioCtx.sampleRate), audioCtx.sampleRate);
    const master = offline.createGain();
    master.gain.value = +masterGainEl.value;
    master.connect(offline.destination);

    for (const t of populated) {
      const src = offline.createBufferSource(); src.buffer = t.audioBuffer;
      const ig = offline.createGain(), dry = offline.createGain();
      const tg = offline.createGain(), pan = offline.createStereoPanner();
      const delay = offline.createDelay(1.0), fb = offline.createGain();
      const dw = offline.createGain(), conv = offline.createConvolver();
      conv.buffer = createImpulseResponse(offline, 2.4, 2.3);
      const rw = offline.createGain();

      tg.gain.value = +t.controls.gain.value;
      pan.pan.value = +t.controls.pan.value;
      delay.delayTime.value = +t.controls.delayTime.value;
      fb.gain.value = +t.controls.feedback.value;
      dw.gain.value = +t.controls.delayMix.value;
      rw.gain.value = +t.controls.reverbMix.value;
      dry.gain.value = 1;

      src.connect(ig);
      ig.connect(dry); dry.connect(tg);
      ig.connect(delay); delay.connect(fb); fb.connect(delay);
      delay.connect(dw); dw.connect(tg);
      ig.connect(conv); conv.connect(rw); rw.connect(tg);
      tg.connect(pan); pan.connect(master);
      src.start(0);
    }

    const rendered = await offline.startRendering();
    const L = rendered.getChannelData(0);
    const R = rendered.numberOfChannels > 1 ? rendered.getChannelData(1) : L;
    const label = populated.length === 1 ? `track-${populated[0].index + 1}-mix` : 'selected-mix';
    downloadBlob(encodeWAVFromFloat32(interleaveStereo(L, R), rendered.sampleRate), `oversaw-${label}-${Date.now()}.wav`);
    setStatus(`Exported ${populated.length} selected track${populated.length === 1 ? '' : 's'} as a mix.`);
  }

  async function exportSelectedAction() {
    const targets = getExportTargets();
    if (!targets.length) { setStatus('No recorded tracks available to export.'); return; }
    await exportFullMix(targets);
  }

  /* ── Audio Init ────────────────────────────────────────── */
  async function setupAudio(selectedDeviceId = '') {
    if (audioCtx) {
      cancelAnimationFrame(meterRAF);
      stopAllTracks();
      if (inputStream) inputStream.getTracks().forEach(t => t.stop());
      if (recordProcessor) recordProcessor.disconnect();
      if (inputSource) inputSource.disconnect();
      if (monitorGain) monitorGain.disconnect();
      if (masterGainNode) masterGainNode.disconnect();
      if (mixBus) mixBus.disconnect();
      await audioCtx.close();
    }

    audioCtx    = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
    await audioCtx.resume();
    mixBus      = audioCtx.createGain();
    masterGainNode = audioCtx.createGain();
    meterAnalyser  = audioCtx.createAnalyser(); meterAnalyser.fftSize = 256;
    monitorGain    = audioCtx.createGain();
    monitorGain.gain.value = monitorEnabledEl.value === 'on' ? 1 : 0;

    mixBus.connect(masterGainNode);
    masterGainNode.connect(meterAnalyser);
    meterAnalyser.connect(audioCtx.destination);
    masterGainNode.gain.value = +masterGainEl.value;

    const constraints = {
      audio: selectedDeviceId
        ? { deviceId: { exact: selectedDeviceId }, channelCount: 1, echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        : { channelCount: 1, echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    };

    inputStream  = await navigator.mediaDevices.getUserMedia(constraints);
    inputSource  = audioCtx.createMediaStreamSource(inputStream);
    inputSource.connect(monitorGain);
    monitorGain.connect(masterGainNode);

    recordProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
    recordProcessor.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      for (const track of tracks) {
        if (track.isRecording) {
          const copy = new Float32Array(input.length);
          copy.set(input);
          track.chunks.push(copy);
          track.totalSamples += copy.length;
          drawWaveform(track, copy);

          let inputPeak = 0;
          for (let i = 0; i < copy.length; i++) inputPeak = Math.max(inputPeak, Math.abs(copy[i]));
          track.meterEl.style.width = `${Math.min(100, inputPeak * 100)}%`;
        } else if (track.analyser) {
          const d = new Uint8Array(track.analyser.frequencyBinCount);
          track.analyser.getByteTimeDomainData(d);
          let peak = 0;
          for (let i = 0; i < d.length; i++) peak = Math.max(peak, Math.abs(d[i] - 128) / 128);
          track.meterEl.style.width = `${Math.min(100, peak * 100)}%`;
        } else {
          track.meterEl.style.width = '0%';
        }
      }
    };

    inputSource.connect(recordProcessor);
    recordProcessor.connect(audioCtx.destination);

    tracks.forEach(track => {
      cleanupTrackAudioGraph(track);
      createTrackAudioGraph(track);
    });

    sampleRateInfo.textContent = `${audioCtx.sampleRate} Hz`;
    sampleRateInfo.classList.remove('muted');
    currentInputDeviceId = selectedDeviceId;
    initAudioBtn.textContent = 'Audio Ready';
    setStatus(`Audio ready at ${audioCtx.sampleRate} Hz.`);
    animateMeters();
  }

  function animateMeters() {
    if (!meterAnalyser) return;
    const data = new Uint8Array(meterAnalyser.frequencyBinCount);
    const tick = () => {
      meterAnalyser.getByteTimeDomainData(data);
      let peak = 0;
      for (let i = 0; i < data.length; i++) peak = Math.max(peak, Math.abs(data[i] - 128) / 128);
      masterMeterEl.style.width = `${Math.min(100, peak * 100)}%`;

      for (const track of tracks) {
        if (track.isPlaying && track.audioBuffer) {
          const elapsed = audioCtx.currentTime - track.playbackStartedAt;
          track.playPosition = track.loop
            ? elapsed % track.audioBuffer.duration
            : Math.min(track.audioBuffer.duration, elapsed);
          drawWaveform(track);
        }
      }
      meterRAF = requestAnimationFrame(tick);
    };
    tick();
  }

  async function refreshDevices() {
    if (!navigator.mediaDevices?.enumerateDevices) return;
    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs = devices.filter(d => d.kind === 'audioinput');
    inputDeviceEl.innerHTML = '';

    if (!inputs.length) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = audioCtx ? 'No inputs detected' : 'Enable audio to load inputs';
      inputDeviceEl.appendChild(opt);
      inputDeviceEl.disabled = true;
      return;
    }

    inputs.forEach((device, i) => {
      const opt = document.createElement('option');
      opt.value = device.deviceId;
      const label = device.label?.trim();
      opt.textContent = label || `Input ${i + 1}`;
      inputDeviceEl.appendChild(opt);
    });

    inputDeviceEl.disabled = false;

    if (currentInputDeviceId && [...inputDeviceEl.options].some(opt => opt.value === currentInputDeviceId)) {
      inputDeviceEl.value = currentInputDeviceId;
    } else if (!inputDeviceEl.value && inputDeviceEl.options.length) {
      inputDeviceEl.selectedIndex = 0;
    }
  }

  async function initAudio() {
    try {
      const selectedDeviceId = inputDeviceEl.disabled ? '' : (inputDeviceEl.value || '');
      await setupAudio(selectedDeviceId);
      await refreshDevices();
      if (!currentInputDeviceId && inputDeviceEl.options.length) currentInputDeviceId = inputDeviceEl.value;
    } catch (err) {
      console.error(err);
      setStatus(`Audio init failed: ${err.message}`);
      sampleRateInfo.textContent = '— Hz';
      sampleRateInfo.classList.add('muted');
    }
  }

  /* ── Bootstrap ─────────────────────────────────────────── */
  function initUI() {
    for (let i = 0; i < TRACK_COUNT; i++) tracks.push(createTrack(i));

    masterGainValue.textContent = (+masterGainEl.value).toFixed(2);
    masterGainEl.addEventListener('input', () => {
      masterGainValue.textContent = (+masterGainEl.value).toFixed(2);
      if (masterGainNode) masterGainNode.gain.value = +masterGainEl.value;
    });
    monitorEnabledEl.addEventListener('change', () => {
      if (monitorGain) monitorGain.gain.value = monitorEnabledEl.value === 'on' ? 1 : 0;
    });

    initAudioBtn.addEventListener('click', initAudio);
    inputDeviceEl.addEventListener('change', async () => {
      if (!inputDeviceEl.value || inputDeviceEl.disabled) return;
      try {
        await setupAudio(inputDeviceEl.value);
        await refreshDevices();
        inputDeviceEl.value = currentInputDeviceId;
        setStatus(`Input switched to ${inputDeviceEl.options[inputDeviceEl.selectedIndex]?.textContent || 'selected device'}.`);
      } catch (err) {
        console.error(err);
        setStatus(`Could not switch device: ${err.message}`);
      }
    });

    exportMixBtn.addEventListener('click', exportSelectedAction);
    playAllBtn.addEventListener('click', playAllTracks);
    stopAllBtn.addEventListener('click', stopAllTracks);
    clearAllBtn.addEventListener('click', () => tracks.forEach((_, i) => clearTrack(i)));

    tracks.forEach(wireTrackUI);

    window.addEventListener('resize', () => tracks.forEach(t => drawWaveform(t)));
    if (navigator.mediaDevices?.enumerateDevices) {
      inputDeviceEl.disabled = true;
      refreshDevices().catch(() => {});
    }
    if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
      navigator.mediaDevices.addEventListener('devicechange', refreshDevices);
    }
  }

  initUI();
</script>
</body>
</html>
